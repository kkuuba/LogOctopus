version: "3.9"

# ── LogOctopus – docker-compose ────────────────────────────────────────────────
#
# Usage
# ─────
#   docker compose up --build          # first run / after code changes
#   docker compose up -d               # start detached
#   docker compose down                # stop & remove containers
#   docker compose logs -f backend     # stream backend logs
#
# Environment variables  (.env file or shell exports)
# ─────────────────────
#   VITE_API_BASE   URL the BROWSER uses to reach the backend API.
#                   Default: http://localhost:8100
#                   For HTTPS deployments: https://yourdomain.com:8100
#
#   ADMIN_USER      Admin username  (default: admin)
#   ADMIN_PASS      Admin password  (default: logoctopus)
#
# Ports
# ─────
#   8050  → React SPA   (served by "serve" / Node)
#   8100  → Flask API

services:

  # ── Flask REST API ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: logoctopus-backend
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: "8100"
      VITE_ADMIN_USER: "${ADMIN_USER:-admin}"
      VITE_ADMIN_PASS: "${ADMIN_PASS:-logoctopus}"
    ports:
      - "0.0.0.0:8100:8100"
    volumes:
      - ./data:/app/data
      - ./settings.json:/app/settings.json
    networks:
      - logoctopus-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8100/api/devices')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── React SPA (Node "serve") ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      args:
        # Must be the URL the BROWSER can reach the backend on.
        VITE_API_BASE: "${VITE_API_BASE:-http://localhost:8100}"
        VITE_ADMIN_USER: "${ADMIN_USER:-admin}"
        VITE_ADMIN_PASS: "${ADMIN_PASS:-logoctopus}"
    container_name: logoctopus-frontend
    restart: unless-stopped
    ports:
      - "0.0.0.0:8050:8050"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - logoctopus-net


networks:
  logoctopus-net:
    driver: bridge
