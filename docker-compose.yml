services:

  # ── Flask REST API ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: "8050"
    volumes:
      # Persistent data directory – device configs, collected logs, etc.
      - logoctopus_data:/app/data
      # settings.json is a single file; bind-mount it so it survives rebuilds.
      # The file must exist on the host before first `docker compose up`.
      - ./settings.json:/app/settings.json
    # Backend is NOT exposed to the host – nginx proxies all /api/* traffic.
    # Uncomment the line below only if you need direct backend access for debugging.
    # ports:
    #   - "8050:8050"
    networks:
      - logoctopus_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8050/api/devices')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── React + nginx ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # The browser hits this URL for API calls.
        # With the nginx proxy in place the frontend and API share the same
        # origin, so an empty string (same-origin /api/*) works perfectly.
        VITE_API_BASE: ""
    restart: unless-stopped
    ports:
      - "8100:80"       # HTTP  – change to "443:443" when adding TLS
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - logoctopus_net

volumes:
  # Named volume for /app/data – survives container rebuilds and restarts.
  logoctopus_data:

networks:
  logoctopus_net:
    driver: bridge
