services:

  # ── Flask REST API ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: "8050"
    volumes:
      - ./data:/app/data
      - ./settings.json:/app/settings.json
    ports:
      - "8050:8050"

  # ── React (served by 'serve') ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE: "http://192.168.100.49:8050"
    restart: unless-stopped
    ports:
      - "8100:8100"
    depends_on:
      - backend
